<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orbital Notebook</title>
<style>
  :root {
    --void:#080b12;--deep:#0d1220;--panel:#111827;--surface:#1a2235;
    --rim:#1f2d45;--muted:#2a3a55;--ghost:#3d5070;--dim:#5a7399;
    --soft:#8ba3c4;--text:#c8d8ee;--bright:#e8f0fc;
    --accent:#4fa3e8;--pulse:#6bb8ff;--warm:#f0a050;
    --danger:#e05555;--success:#50c878;
    --font-mono:'JetBrains Mono','Fira Code',monospace;
    --font-ui:'Inter',system-ui,sans-serif;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--font-ui);background:var(--void);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column}
  /* topbar */
  #topbar{display:flex;align-items:center;gap:12px;padding:0 16px;height:44px;background:var(--deep);border-bottom:1px solid var(--rim);flex-shrink:0;z-index:100}
  #topbar .logo{font-family:var(--font-mono);font-size:13px;color:var(--pulse);letter-spacing:.08em;user-select:none}
  #topbar .logo span{color:var(--warm)}
  .topbar-sep{flex:1}
  .tb-btn{background:var(--surface);border:1px solid var(--muted);color:var(--soft);font-size:12px;padding:4px 10px;border-radius:4px;cursor:pointer;font-family:var(--font-ui);transition:background .15s,color .15s}
  .tb-btn:hover{background:var(--muted);color:var(--bright)}
  .tb-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
  /* layout */
  #workspace{display:flex;flex:1;overflow:hidden}
  /* notebook */
  #notebook-panel{width:380px;min-width:280px;max-width:600px;display:flex;flex-direction:column;border-right:1px solid var(--rim);background:var(--panel);position:relative;flex-shrink:0}
  #notebook-panel.collapsed{width:0;min-width:0;border-right:none;overflow:hidden}
  #notebook-header{display:flex;align-items:center;padding:10px 14px;border-bottom:1px solid var(--rim);gap:8px;flex-shrink:0}
  #notebook-title{font-family:var(--font-mono);font-size:11px;color:var(--dim);letter-spacing:.1em;text-transform:uppercase;flex:1}
  #cells-container{flex:1;overflow-y:auto;padding:10px 10px 60px;scrollbar-width:thin;scrollbar-color:var(--muted) transparent}
  #cells-container::-webkit-scrollbar{width:4px}
  #cells-container::-webkit-scrollbar-thumb{background:var(--muted);border-radius:2px}
  .cell{background:var(--surface);border:1px solid var(--rim);border-radius:6px;margin-bottom:8px;transition:border-color .15s;position:relative}
  .cell:hover{border-color:var(--ghost)}
  .cell.dragging{opacity:.5}
  .cell.drag-over{border-color:var(--pulse);box-shadow:0 0 0 2px rgba(107,184,255,.2)}
  .cell-header{display:flex;align-items:center;gap:6px;padding:6px 8px;border-bottom:1px solid var(--rim);cursor:grab}
  .cell-header:active{cursor:grabbing}
  .cell-type-badge{font-family:var(--font-mono);font-size:9px;padding:2px 6px;border-radius:3px;letter-spacing:.08em;text-transform:uppercase;user-select:none}
  .badge-text{background:rgba(79,163,232,.15);color:var(--accent);border:1px solid rgba(79,163,232,.3)}
  .badge-md{background:rgba(80,200,120,.15);color:var(--success);border:1px solid rgba(80,200,120,.3)}
  .badge-orbit{background:rgba(240,160,80,.15);color:var(--warm);border:1px solid rgba(240,160,80,.3)}
  .cell-label{font-size:11px;color:var(--dim);flex:1;font-family:var(--font-mono);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .cell-actions{display:flex;gap:3px}
  .cell-btn{background:transparent;border:none;color:var(--ghost);cursor:pointer;padding:2px 5px;border-radius:3px;font-size:12px;line-height:1;transition:color .1s,background .1s}
  .cell-btn:hover{color:var(--bright);background:var(--muted)}
  .cell-btn.danger:hover{color:var(--danger)}
  .cell-body{padding:8px}
  .cell-editor{width:100%;background:var(--deep);border:1px solid var(--muted);border-radius:4px;color:var(--text);font-family:var(--font-mono);font-size:12px;line-height:1.6;padding:8px;resize:vertical;min-height:60px;outline:none;transition:border-color .15s}
  .cell-editor:focus{border-color:var(--accent)}
  .cell-rendered{font-size:13px;line-height:1.7;color:var(--text);cursor:pointer;min-height:28px}
  .cell-rendered h1,.cell-rendered h2,.cell-rendered h3{color:var(--bright);margin-bottom:6px}
  .cell-rendered h1{font-size:18px}.cell-rendered h2{font-size:15px}.cell-rendered h3{font-size:13px}
  .cell-rendered p{margin-bottom:6px}
  .cell-rendered code{font-family:var(--font-mono);background:var(--deep);padding:1px 4px;border-radius:3px;font-size:11px}
  .cell-rendered ul,.cell-rendered ol{padding-left:20px}
  .cell-rendered strong{color:var(--bright)}.cell-rendered em{color:var(--soft)}
  .cell-placeholder{color:var(--ghost);font-size:12px;font-style:italic;padding:4px}
  .cell-orbit-embed{width:100%;height:220px;background:var(--void);border-radius:4px;overflow:hidden;position:relative;cursor:pointer}
  .cell-orbit-embed canvas{width:100%;height:100%}
  .orbit-embed-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(8,11,18,.6);color:var(--soft);font-size:12px;gap:6px;transition:background .2s}
  .orbit-embed-overlay:hover{background:rgba(8,11,18,.3)}
  .orbit-embed-overlay .open-icon{font-size:20px;color:var(--warm)}
  #add-cell-bar{position:absolute;bottom:0;left:0;right:0;padding:8px 10px;background:linear-gradient(to top,var(--panel) 60%,transparent);display:flex;gap:6px;align-items:center}
  .add-btn{flex:1;background:var(--surface);border:1px dashed var(--muted);color:var(--dim);font-size:11px;padding:5px 0;border-radius:4px;cursor:pointer;font-family:var(--font-ui);transition:all .15s}
  .add-btn:hover{border-color:var(--accent);color:var(--accent);background:rgba(79,163,232,.06)}
  #resize-handle{width:4px;background:var(--rim);cursor:col-resize;flex-shrink:0;transition:background .15s}
  #resize-handle:hover{background:var(--accent)}
  /* simulator */
  #sim-panel{flex:1;display:flex;flex-direction:column;position:relative;background:var(--void);overflow:hidden}
  #sim-toolbar{display:flex;align-items:center;gap:8px;padding:6px 12px;background:var(--deep);border-bottom:1px solid var(--rim);flex-shrink:0;flex-wrap:wrap}
  .sim-group{display:flex;align-items:center;gap:4px;padding:0 6px;border-right:1px solid var(--rim)}
  .sim-group:last-child{border-right:none;padding-right:0}
  .sim-btn{background:var(--surface);border:1px solid var(--muted);color:var(--soft);cursor:pointer;padding:4px 8px;border-radius:4px;font-size:13px;transition:all .12s;min-width:28px;text-align:center}
  .sim-btn:hover{background:var(--muted);color:var(--bright)}
  .sim-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
  .sim-btn.play-active{background:#1a3a1a;color:var(--success);border-color:var(--success)}
  .sim-label{font-size:10px;color:var(--dim);font-family:var(--font-mono);letter-spacing:.06em;white-space:nowrap}
  #timewarp-slider{width:90px;accent-color:var(--accent);cursor:pointer}
  #timewarp-display{font-family:var(--font-mono);font-size:11px;color:var(--warm);min-width:52px}
  .sim-select{background:var(--surface);border:1px solid var(--muted);color:var(--text);font-size:11px;padding:3px 6px;border-radius:4px;cursor:pointer;font-family:var(--font-ui)}
  .sim-select:focus{outline:none;border-color:var(--accent)}
  #canvas-wrapper{flex:1;position:relative;overflow:hidden}
  #sim-canvas{display:block;width:100%;height:100%;cursor:crosshair;position:relative;z-index:1}
  #sim-canvas.panning{cursor:grab}
  #sim-canvas.panning:active{cursor:grabbing}
  #sim-canvas.measuring{cursor:crosshair}
  /* status */
  #status-bar{display:flex;align-items:center;gap:14px;padding:4px 12px;background:var(--deep);border-top:1px solid var(--rim);flex-shrink:0;font-family:var(--font-mono);font-size:10px;color:var(--dim)}
  .stat{display:flex;gap:4px}
  .stat-label{color:var(--ghost)}
  .stat-val{color:var(--soft)}
  .stat-val.ok{color:var(--success)}
  .stat-val.warn{color:var(--warm)}
  #mode-indicator{margin-left:auto;color:var(--accent);font-size:10px}
  /* popover */
  #place-popover{position:absolute;background:var(--panel);border:1px solid var(--accent);border-radius:8px;padding:12px;width:230px;box-shadow:0 8px 32px rgba(0,0,0,.5);z-index:50;display:none}
  #place-popover.visible{display:block}
  .pop-title{font-size:11px;color:var(--soft);font-family:var(--font-mono);margin-bottom:10px;letter-spacing:.06em;text-transform:uppercase}
  .pop-row{display:flex;align-items:center;gap:8px;margin-bottom:7px}
  .pop-row label{font-size:11px;color:var(--dim);width:68px;flex-shrink:0;font-family:var(--font-mono)}
  .pop-input{flex:1;background:var(--deep);border:1px solid var(--muted);color:var(--text);font-size:11px;padding:4px 6px;border-radius:3px;font-family:var(--font-mono);outline:none;width:100%}
  .pop-input:focus{border-color:var(--accent)}
  .pop-unit{font-size:10px;color:var(--ghost);font-family:var(--font-mono);flex-shrink:0}
  .pop-actions{display:flex;gap:6px;margin-top:10px}
  .pop-btn{flex:1;padding:5px 0;border-radius:4px;font-size:11px;cursor:pointer;font-family:var(--font-ui);border:1px solid;transition:all .12s}
  .pop-btn-place{background:var(--accent);color:#fff;border-color:var(--accent)}
  .pop-btn-place:hover{background:var(--pulse)}
  .pop-btn-cancel{background:transparent;color:var(--dim);border-color:var(--muted)}
  .pop-btn-cancel:hover{background:var(--muted);color:var(--text)}
  .vel-section{margin-bottom:10px}
  .vel-title{font-size:10px;color:var(--dim);font-family:var(--font-mono);text-align:center;margin-bottom:4px;letter-spacing:.05em}
  #vel-canvas{width:80px;height:80px;border-radius:50%;background:var(--deep);border:1px solid var(--muted);cursor:crosshair;display:block;margin:0 auto 4px}
  /* tooltip */
  #body-tooltip{position:absolute;background:rgba(13,18,32,.92);border:1px solid var(--rim);border-radius:6px;padding:8px 10px;font-family:var(--font-mono);font-size:10px;color:var(--soft);pointer-events:none;z-index:40;display:none;line-height:1.8}
  #body-tooltip.visible{display:block}
  #body-tooltip .tt-name{color:var(--bright);font-size:11px;margin-bottom:3px}
  /* measure label */
  #measure-label{position:absolute;background:rgba(13,18,32,.9);border:1px solid var(--warm);border-radius:4px;padding:4px 8px;font-family:var(--font-mono);font-size:11px;color:var(--warm);pointer-events:none;z-index:35;display:none;white-space:nowrap}
  #measure-label.visible{display:block}
  /* resonance */
  #resonance-log{position:absolute;top:8px;right:8px;background:rgba(13,18,32,.85);border:1px solid var(--rim);border-radius:6px;padding:8px 10px;font-family:var(--font-mono);font-size:10px;color:var(--dim);max-width:200px;z-index:30}
  .res-entry{color:var(--warm);margin-bottom:2px}
  /* toasts */
  #toast-container{position:fixed;bottom:40px;right:16px;z-index:1000;display:flex;flex-direction:column;gap:6px;pointer-events:none}
  .toast{background:var(--surface);border:1px solid var(--muted);border-radius:6px;padding:8px 14px;font-size:12px;color:var(--text);animation:toastIn .2s ease,toastOut .3s ease 2s forwards}
  @keyframes toastIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  @keyframes toastOut{to{opacity:0;transform:translateY(10px)}}
  /* star canvas */
  #stars-canvas{position:absolute;inset:0;pointer-events:none;z-index:0}
  *{scrollbar-width:thin;scrollbar-color:var(--muted) transparent}
</style>
</head>
<body>
<div id="topbar">
  <div class="logo">orbital<span>·</span>notebook</div>
  <div class="topbar-sep"></div>
  <button class="tb-btn" id="btn-toggle-notebook">◧ Notebook</button>
  <button class="tb-btn" id="btn-export">↑ Export</button>
  <button class="tb-btn" id="btn-import">↓ Import</button>
</div>
<div id="workspace">
  <div id="notebook-panel">
    <div id="notebook-header">
      <span id="notebook-title">// notebook</span>
      <button class="cell-btn" id="btn-nb-collapse">✕</button>
    </div>
    <div id="cells-container"></div>
    <div id="add-cell-bar">
      <button class="add-btn" data-type="text">+ Text</button>
      <button class="add-btn" data-type="md">+ Markdown</button>
      <button class="add-btn" data-type="orbit">+ Orbit</button>
    </div>
  </div>
  <div id="resize-handle"></div>
  <div id="sim-panel">
    <div id="sim-toolbar">
      <div class="sim-group">
        <button class="sim-btn" id="btn-play" title="Play/Pause (Space)">▶</button>
        <button class="sim-btn" id="btn-step" title="Step one tick">⏭</button>
        <button class="sim-btn" id="btn-reset" title="Reset">↺</button>
      </div>
      <div class="sim-group">
        <span class="sim-label">warp</span>
        <input type="range" id="timewarp-slider" min="-1" max="4" step="0.01" value="0">
        <span id="timewarp-display">1×</span>
      </div>
      <div class="sim-group">
        <button class="sim-btn" id="btn-place-mode" title="Place body (P)">⊕ Place</button>
        <button class="sim-btn" id="btn-pan-mode" title="Pan (V)">✥ Pan</button>
        <button class="sim-btn" id="btn-measure-mode" title="Measure distance (M)">⟷ Measure</button>
      </div>
      <div class="sim-group">
        <button class="sim-btn" id="btn-trails" title="Trails (T)">〜 Trails</button>
        <button class="sim-btn" id="btn-grid" title="Grid (G)">⊞ Grid</button>
        <button class="sim-btn" id="btn-com" title="Center of mass">✛ CoM</button>
        <button class="sim-btn" id="btn-fit" title="Fit all (F)">⤢ Fit</button>
      </div>
      <div class="sim-group">
        <select class="sim-select" id="preset-select">
          <option value="">Presets…</option>
          <option value="solar">Solar System</option>
          <option value="earthmoon">Earth–Moon</option>
          <option value="binary">Binary Stars</option>
          <option value="figure8">Figure-8</option>
          <option value="blank">Blank</option>
        </select>
      </div>
      <div class="sim-group">
        <span class="sim-label">unit</span>
        <button class="sim-btn" id="btn-unit-toggle">kg</button>
      </div>
    </div>
    <div id="canvas-wrapper">
      <canvas id="stars-canvas"></canvas>
      <canvas id="sim-canvas"></canvas>
      <div id="place-popover">
        <div class="pop-title">Place body</div>
        <div class="vel-section">
          <div class="vel-title">drag wheel · set direction &amp; speed</div>
          <canvas id="vel-canvas" width="80" height="80"></canvas>
        </div>
        <div class="pop-row"><label>Name</label><input class="pop-input" id="pop-name" type="text" placeholder="Body A" maxlength="20"></div>
        <div class="pop-row">
          <label>Mass</label>
          <input class="pop-input" id="pop-mass" type="number" value="1e24" step="any">
          <span class="pop-unit" id="pop-mass-unit">kg</span>
        </div>
        <div class="pop-row">
          <label>Speed</label>
          <input class="pop-input" id="pop-speed" type="number" value="0" min="0" step="any">
          <span class="pop-unit">m/s</span>
        </div>
        <div class="pop-row">
          <label>Dir °</label>
          <input class="pop-input" id="pop-angle" type="number" value="90" min="-360" max="360" step="1">
          <span class="pop-unit">deg</span>
        </div>
        <div class="pop-actions">
          <button class="pop-btn pop-btn-place" id="pop-place-btn">Place</button>
          <button class="pop-btn pop-btn-cancel" id="pop-cancel-btn">Cancel</button>
        </div>
      </div>
      <div id="body-tooltip">
        <div class="tt-name" id="tt-name"></div>
        <div id="tt-mass"></div><div id="tt-vel"></div>
        <div id="tt-dist"></div><div id="tt-period"></div>
      </div>
      <div id="measure-label"></div>
      <div id="resonance-log">
        <div style="color:var(--ghost);font-size:9px;margin-bottom:4px;letter-spacing:.1em">RESONANCES</div>
        <div id="res-entries">—</div>
      </div>
    </div>
    <div id="status-bar">
      <div class="stat"><span class="stat-label">t</span><span class="stat-val" id="stat-time">0.00 yr</span></div>
      <div class="stat"><span class="stat-label">E</span><span class="stat-val ok" id="stat-energy">—</span></div>
      <div class="stat"><span class="stat-label">ΔE</span><span class="stat-val ok" id="stat-denergy">—</span></div>
      <div class="stat"><span class="stat-label">bodies</span><span class="stat-val" id="stat-bodies">0</span></div>
      <div class="stat"><span class="stat-label">zoom</span><span class="stat-val" id="stat-zoom">1.0×</span></div>
      <div class="stat"><span class="stat-label">dist</span><span class="stat-val" id="stat-dist">—</span></div>
      <div id="mode-indicator">PLACE MODE</div>
    </div>
  </div>
</div>
<div id="toast-container"></div>

<script>
// ── Constants ──────────────────────────────────────────────────────────────
const G       = 6.674e-11;
const AU      = 1.496e11;
const YEAR    = 3.156e7;
const LY      = 9.461e15;
const SOLAR_MASS = 1.989e30;

// ── Simulation state ───────────────────────────────────────────────────────
let bodies = [], trails = [];
const MAX_TRAIL = 600;
let isPlaying = false, showTrails = true, showCoM = false, showGrid = false;
let useAU = false, followBody = null, timeWarp = 1;
let simTime = 0, initialEnergy = null, stepCount = 0;
let camX = 0, camY = 0, camZoom = 1e-10;
let mode = 'place';   // 'place' | 'pan' | 'measure'
let placePending = null;
let velAngle = Math.PI/2;   // radians, world frame (+y = up)
let velMag = 0;
let velDragging = false;
let hoveredBody = null;
let resonanceData = [];

// Measure state
let measurePt1 = null, measurePt2 = null, measureMouseWorld = null;

// Pan state (both right-click and middle-click work in any mode)
let panning = false, panStartX = 0, panStartY = 0;
let resizing = false, rsStartX = 0, rsPanelW = 0;

const COLORS = ['#4fa3e8','#f0a050','#50c878','#e055aa','#a07cf0',
                '#50d8d8','#f07050','#c8e840','#ff8060','#60c8ff'];
let colorIdx = 0, bodyCounter = 0;

// ── Physical radius from mass ──────────────────────────────────────────────
// Uses density: rocky<1e25 → 5500, gas giant<1e28 → 1400, star → 1409
function physRadiusFromMass(m) {
  const density = m < 1e25 ? 5500 : m < 1e28 ? 1400 : 1409;
  return Math.max(1e5, Math.cbrt(3*m/(4*Math.PI*density)));
}

// ── Notebook ───────────────────────────────────────────────────────────────
let cells = [], cellCounter = 0;

function createCell(type, content='') {
  return { id:++cellCounter, type, content,
    editing: type!=='orbit',
    label: type==='orbit'?'Orbit canvas': type==='md'?'Markdown':'Text' };
}

function renderNotebook() {
  const c = document.getElementById('cells-container');
  c.innerHTML = '';
  cells.forEach((cell,idx) => c.appendChild(buildCellEl(cell,idx)));
}

function buildCellEl(cell,idx) {
  const div = document.createElement('div');
  div.className='cell'; div.draggable=true; div.dataset.id=cell.id;
  const hdr = document.createElement('div'); hdr.className='cell-header';
  const badge = document.createElement('span');
  badge.className=`cell-type-badge badge-${cell.type}`;
  badge.textContent=cell.type==='orbit'?'orbit':cell.type==='md'?'md':'text';
  const lbl = document.createElement('span');
  lbl.className='cell-label'; lbl.textContent=cell.label;
  const acts = document.createElement('div'); acts.className='cell-actions';
  const mkBtn=(icon,title,cls,fn)=>{
    const b=document.createElement('button');
    b.className='cell-btn'+(cls?' '+cls:'');
    b.innerHTML=icon; b.title=title;
    b.addEventListener('click',e=>{e.stopPropagation();fn()});
    return b;
  };
  if(cell.type!=='orbit') acts.appendChild(mkBtn(cell.editing?'👁':'✎',cell.editing?'Preview':'Edit','',()=>{cell.editing=!cell.editing;renderNotebook()}));
  if(idx>0) acts.appendChild(mkBtn('↑','Move up','',()=>{[cells[idx-1],cells[idx]]=[cells[idx],cells[idx-1]];renderNotebook()}));
  if(idx<cells.length-1) acts.appendChild(mkBtn('↓','Move down','',()=>{[cells[idx],cells[idx+1]]=[cells[idx+1],cells[idx]];renderNotebook()}));
  acts.appendChild(mkBtn('⧉','Duplicate','',()=>{const cp={...createCell(cell.type,cell.content),label:cell.label+' (copy)'};cells.splice(idx+1,0,cp);renderNotebook()}));
  acts.appendChild(mkBtn('✕','Delete','danger',()=>{cells.splice(idx,1);renderNotebook()}));
  hdr.appendChild(badge); hdr.appendChild(lbl); hdr.appendChild(acts);
  div.appendChild(hdr);
  const body=document.createElement('div'); body.className='cell-body';
  if(cell.type==='orbit'){
    const embed=document.createElement('div'); embed.className='cell-orbit-embed';
    const ec=document.createElement('canvas'); embed.appendChild(ec);
    const ov=document.createElement('div'); ov.className='orbit-embed-overlay';
    ov.innerHTML='<span class="open-icon">⊙</span><span>Open in simulator</span>';
    ov.addEventListener('click',()=>toast('Orbit cell linked to main simulator'));
    embed.appendChild(ov); body.appendChild(embed);
    requestAnimationFrame(()=>drawMiniOrbit(ec,cell));
  } else if(cell.editing){
    const ta=document.createElement('textarea');
    ta.className='cell-editor'; ta.value=cell.content;
    ta.placeholder=cell.type==='md'?'# Heading\n**bold** *italic* `code`':'Write a note…';
    ta.addEventListener('input',()=>{
      cell.content=ta.value;
      const fl=ta.value.split('\n')[0].replace(/^#+\s*/,'').trim();
      if(fl){cell.label=fl.slice(0,40);lbl.textContent=cell.label;}
    });
    ta.addEventListener('keydown',e=>{
      if(e.key==='Tab'){e.preventDefault();const s=ta.selectionStart;ta.value=ta.value.slice(0,s)+'  '+ta.value.slice(ta.selectionEnd);ta.selectionStart=ta.selectionEnd=s+2;}
    });
    body.appendChild(ta);
    setTimeout(()=>ta.focus(),30);
  } else {
    const rd=document.createElement('div'); rd.className='cell-rendered';
    if(cell.content.trim()) rd.innerHTML=cell.type==='md'?parseMarkdown(cell.content):escHtml(cell.content).replace(/\n/g,'<br>');
    else rd.innerHTML='<span class="cell-placeholder">Click ✎ to edit</span>';
    rd.addEventListener('dblclick',()=>{cell.editing=true;renderNotebook()});
    body.appendChild(rd);
  }
  div.appendChild(body);
  div.addEventListener('dragstart',e=>{div.classList.add('dragging');e.dataTransfer.setData('text/plain',idx)});
  div.addEventListener('dragend',()=>div.classList.remove('dragging'));
  div.addEventListener('dragover',e=>{e.preventDefault();div.classList.add('drag-over')});
  div.addEventListener('dragleave',()=>div.classList.remove('drag-over'));
  div.addEventListener('drop',e=>{
    e.preventDefault();div.classList.remove('drag-over');
    const from=parseInt(e.dataTransfer.getData('text/plain'));
    if(from!==idx){const[moved]=cells.splice(from,1);cells.splice(idx,0,moved);renderNotebook();}
  });
  return div;
}

function drawMiniOrbit(canvas,cell){

    const maxR=Math.max(...bodies.map(b=>Math.max(Math.abs(b.x),Math.abs(b.y))))||1;
    const scale=Math.min(cx,cy)*0.8/maxR;
    bodies.forEach(b=>{

  }
}

function parseMarkdown(t){
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/^### (.+)$/gm,'<h3>$1</h3>').replace(/^## (.+)$/gm,'<h2>$1</h2>').replace(/^# (.+)$/gm,'<h1>$1</h1>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*(.+?)\*/g,'<em>$1</em>').replace(/`(.+?)`/g,'<code>$1</code>')
    .replace(/^- (.+)$/gm,'<li>$1</li>').replace(/(<li>[\s\S]*?<\/li>)/g,'<ul>$1</ul>')
    .replace(/\n\n/g,'</p><p>');
}

// ── Physics ────────────────────────────────────────────────────────────────
function computeForces(bs){
  const n=bs.length, forces=bs.map(()=>({fx:0,fy:0}));
  for(let i=0;i<n;i++) for(let j=i+1;j<n;j++){
    const dx=bs[j].x-bs[i].x, dy=bs[j].y-bs[i].y;
    const r2=dx*dx+dy*dy;
    // Softening uses physical radii (not visual)
    const soft=Math.max((bs[i].physRadius+bs[j].physRadius)*0.3, 1e5);
    const r2s=r2+soft*soft;
    const r=Math.sqrt(r2s);
    const f=G*bs[i].mass*bs[j].mass/r2s;
    const fx=f*dx/r, fy=f*dy/r;
    forces[i].fx+=fx; forces[i].fy+=fy;
    forces[j].fx-=fx; forces[j].fy-=fy;
  }
  return forces;
}

function leapfrogStep(bs,dt){
  if(!bs.length) return bs;
  const n=bs.length;
  const f1=computeForces(bs);
  for(let i=0;i<n;i++){bs[i].ax=f1[i].fx/bs[i].mass; bs[i].ay=f1[i].fy/bs[i].mass;}
  for(let i=0;i<n;i++){bs[i].x+=bs[i].vx*dt+0.5*bs[i].ax*dt*dt; bs[i].y+=bs[i].vy*dt+0.5*bs[i].ay*dt*dt;}
  const f2=computeForces(bs);
  for(let i=0;i<n;i++){
    const ax2=f2[i].fx/bs[i].mass, ay2=f2[i].fy/bs[i].mass;
    bs[i].vx+=0.5*(bs[i].ax+ax2)*dt; bs[i].vy+=0.5*(bs[i].ay+ay2)*dt;
    bs[i].ax=ax2; bs[i].ay=ay2;
  }
  return bs;
}

function adaptiveStep(bs,basedt){
  if(bs.length<2) return basedt;
  let minR=Infinity;
  for(let i=0;i<bs.length;i++) for(let j=i+1;j<bs.length;j++){
    const dx=bs[j].x-bs[i].x,dy=bs[j].y-bs[i].y;
    minR=Math.min(minR,Math.sqrt(dx*dx+dy*dy));
  }
  return basedt*Math.min(1,Math.max(0.001,minR/AU));
}

function checkCollisions(bs){
  for(let i=0;i<bs.length;i++) for(let j=i+1;j<bs.length;j++){
    if(!bs[i]||!bs[j]) continue;
    const dx=bs[j].x-bs[i].x, dy=bs[j].y-bs[i].y;
    const r=Math.sqrt(dx*dx+dy*dy);
    // Use PHYSICAL radii for collision — not visual
    const threshold=(bs[i].physRadius+bs[j].physRadius)*1.05;
    if(r<threshold){
      const m1=bs[i].mass,m2=bs[j].mass,mt=m1+m2;
      const merged={
        id:bs[i].id,
        name:m1>=m2?bs[i].name:bs[j].name,
        mass:mt,
        x:(m1*bs[i].x+m2*bs[j].x)/mt,
        y:(m1*bs[i].y+m2*bs[j].y)/mt,
        vx:(m1*bs[i].vx+m2*bs[j].vx)/mt,
        vy:(m1*bs[i].vy+m2*bs[j].vy)/mt,
        ax:0,ay:0,
        physRadius:physRadiusFromMass(mt),
        color:m1>=m2?bs[i].color:bs[j].color,
      };
      toast(`💥 ${bs[i].name}+${bs[j].name} merged → ${merged.name}`);
      bs.splice(j,1); bs.splice(i,1);
      bs.push(merged);
      trails=trails.filter(t=>t.id!==bs[i]?.id&&t.id!==bs[j]?.id);
      return bs;
    }
  }
  return bs;
}

function kineticEnergy(bs){return bs.reduce((s,b)=>s+0.5*b.mass*(b.vx*b.vx+b.vy*b.vy),0)}
function potentialEnergy(bs){
  let pe=0;
  for(let i=0;i<bs.length;i++) for(let j=i+1;j<bs.length;j++){
    const dx=bs[j].x-bs[i].x,dy=bs[j].y-bs[i].y;
    pe-=G*bs[i].mass*bs[j].mass/(Math.sqrt(dx*dx+dy*dy)||1);
  }
  return pe;
}
function totalEnergy(bs){return kineticEnergy(bs)+potentialEnergy(bs)}

function estimatePeriod(b,bs){
  const heavy=bs.reduce((a,c)=>c.mass>a.mass?c:a,bs[0]);
  if(b===heavy) return null;
  const dx=b.x-heavy.x,dy=b.y-heavy.y,r=Math.sqrt(dx*dx+dy*dy);
  if(r<1e6) return null;
  return 2*Math.PI*Math.sqrt(r*r*r/(G*(b.mass+heavy.mass)));
}

function detectResonances(bs){
  if(bs.length<3){resonanceData=[];return;}
  const heavy=bs.reduce((a,c)=>c.mass>a.mass?c:a,bs[0]);
  const periods=bs.filter(b=>b!==heavy).map(b=>({b,T:estimatePeriod(b,bs)})).filter(x=>x.T>0);
  const pairs=[];
  for(let i=0;i<periods.length;i++) for(let j=i+1;j<periods.length;j++){
    const r=periods[i].T/periods[j].T;
    for(let p=1;p<=4;p++) for(let q=1;q<=4;q++){
      if(Math.abs(r-p/q)<0.04) pairs.push(`${periods[i].b.name}:${periods[j].b.name} = ${p}:${q}`);
    }
  }
  resonanceData=[...new Set(pairs)].slice(0,4);
}

const simCanvas=document.getElementById('sim-canvas');
const ctx2=simCanvas.getContext('2d');
const starsCanvas=document.getElementById('stars-canvas');
const sctx=starsCanvas.getContext('2d');
let stars=[];

function resizeCanvases(){

function worldToScreen(wx,wy){
  return{x:simCanvas.width/2+(wx-camX)*camZoom, y:simCanvas.height/2-(wy-camY)*camZoom};
}
function screenToWorld(sx,sy){
  return{x:(sx-simCanvas.width/2)/camZoom+camX, y:-((sy-simCanvas.height/2)/camZoom)+camY};
}

function bodyScreenRadius(b){
  const logR=Math.log10(b.mass/1e20)*2+3;
  return Math.max(3,Math.min(28,logR));
}

// ── F: Grid drawing ────────────────────────────────────────────────────────
function drawGrid(){
  const W=simCanvas.width,H=simCanvas.height;
  // Determine a nice world-space grid spacing
  // We want ~6 lines across the width
  const worldW=W/camZoom;
  const rawSpacing=worldW/6;
  // Snap to 1,2,5 × 10^n
  const exp=Math.floor(Math.log10(rawSpacing));
  const base=Math.pow(10,exp);
  let spacing;
  if(rawSpacing/base<1.5) spacing=base;
  else if(rawSpacing/base<3.5) spacing=2*base;
  else if(rawSpacing/base<7.5) spacing=5*base;
  else spacing=10*base;

  ctx2.save();
  ctx2.lineWidth=1;

  const tl=screenToWorld(0,0), br=screenToWorld(W,H);
  const x0=Math.floor(tl.x/spacing)*spacing;
  const x1=Math.ceil(br.x/spacing)*spacing;
  const y0=Math.floor(br.y/spacing)*spacing;
  const y1=Math.ceil(tl.y/spacing)*spacing;

  // Vertical lines
  for(let wx=x0;wx<=x1;wx+=spacing){
    const sx=worldToScreen(wx,0).x;
    ctx2.strokeStyle=wx===0?'rgba(255,255,255,.12)':'rgba(255,255,255,.04)';
    ctx2.beginPath(); ctx2.moveTo(sx,0); ctx2.lineTo(sx,H); ctx2.stroke();
    // label
    if(wx!==0){
      ctx2.fillStyle='rgba(90,115,153,.7)';
      ctx2.font='9px monospace';
      ctx2.fillText(formatDist(wx),sx+2,H-6);
    }
  }
  // Horizontal lines
  for(let wy=y0;wy<=y1;wy+=spacing){
    const sy=worldToScreen(0,wy).y;
    ctx2.strokeStyle=wy===0?'rgba(255,255,255,.12)':'rgba(255,255,255,.04)';
    ctx2.beginPath(); ctx2.moveTo(0,sy); ctx2.lineTo(W,sy); ctx2.stroke();
    if(wy!==0){
      ctx2.fillStyle='rgba(90,115,153,.7)';
      ctx2.font='9px monospace';
      ctx2.fillText(formatDist(wy),4,sy-3);
    }
  }
  // Axis labels at origin
  ctx2.fillStyle='rgba(107,184,255,.5)';
  ctx2.font='9px monospace';
  const ox=worldToScreen(0,0);
  if(ox.x>0&&ox.x<W&&ox.y>0&&ox.y<H) ctx2.fillText('0',ox.x+2,ox.y-3);

  ctx2.restore();
}

function formatDist(m){
  const abs=Math.abs(m);
  if(abs>=LY) return (m/LY).toFixed(1)+'ly';
  if(abs>=AU*100) return (m/LY*100).toFixed(0)+'×AU/100';
  if(abs>=AU) return (m/AU).toPrecision(3)+'AU';
  if(abs>=1e9) return (m/1e9).toPrecision(3)+'Gm';
  if(abs>=1e6) return (m/1e6).toPrecision(3)+'Mm';
  return (m/1e3).toPrecision(3)+'km';
}
function formatDistAuto(m){return formatDist(m)}

// ── Drawing ────────────────────────────────────────────────────────────────
function lighten(hex,a){const n=parseInt(hex.slice(1),16),r=Math.min(255,((n>>16)&0xff)+a),g=Math.min(255,((n>>8)&0xff)+a),b=Math.min(255,(n&0xff)+a);return`rgb(${r},${g},${b})`}
function darken(hex,a){const n=parseInt(hex.slice(1),16),r=Math.max(0,((n>>16)&0xff)-a),g=Math.max(0,((n>>8)&0xff)-a),b=Math.max(0,(n&0xff)-a);return`rgb(${r},${g},${b})`}

function drawFrame(){
  const W=simCanvas.width,H=simCanvas.height;
  ctx2.clearRect(0,0,W,H);

  if(followBody){const fb=bodies.find(b=>b.id===followBody);if(fb){camX=fb.x;camY=fb.y;}}

  // F: Grid (below trails)
  if(showGrid) drawGrid();

  // Trails
  if(showTrails) trails.forEach(trail=>{
    if(trail.pts.length<2) return;
    ctx2.beginPath();
    const n=trail.pts.length;
    for(let i=0;i<n;i++){const{x,y}=worldToScreen(trail.pts[i].x,trail.pts[i].y);i===0?ctx2.moveTo(x,y):ctx2.lineTo(x,y);}
    const last=worldToScreen(trail.pts[n-1].x,trail.pts[n-1].y);
    const first=worldToScreen(trail.pts[0].x,trail.pts[0].y);
    const grad=ctx2.createLinearGradient(first.x,first.y,last.x,last.y);
    grad.addColorStop(0,'transparent'); grad.addColorStop(1,trail.color+'aa');
    ctx2.strokeStyle=grad; ctx2.lineWidth=1; ctx2.stroke();
  });

  // CoM
  if(showCoM&&bodies.length>0){
    const tm=bodies.reduce((s,b)=>s+b.mass,0);
    const cx=bodies.reduce((s,b)=>s+b.x*b.mass,0)/tm;
    const cy=bodies.reduce((s,b)=>s+b.y*b.mass,0)/tm;
    const sp=worldToScreen(cx,cy);
    ctx2.strokeStyle='rgba(107,184,255,.4)'; ctx2.lineWidth=1;
    ctx2.beginPath();ctx2.moveTo(sp.x-8,sp.y);ctx2.lineTo(sp.x+8,sp.y);ctx2.stroke();
    ctx2.beginPath();ctx2.moveTo(sp.x,sp.y-8);ctx2.lineTo(sp.x,sp.y+8);ctx2.stroke();
  }

  // A: Measure line
  if(mode==='measure'){
    const p1s = measurePt1?worldToScreen(measurePt1.x,measurePt1.y):null;
    const p2w = measurePt2 || measureMouseWorld;
    const p2s = p2w?worldToScreen(p2w.x,p2w.y):null;
    if(p1s){
      ctx2.beginPath(); ctx2.arc(p1s.x,p1s.y,4,0,Math.PI*2);
      ctx2.fillStyle=COLORS[3]; ctx2.fill();
    }
    if(p1s&&p2s){
      ctx2.beginPath(); ctx2.moveTo(p1s.x,p1s.y); ctx2.lineTo(p2s.x,p2s.y);
      ctx2.strokeStyle=COLORS[3]; ctx2.lineWidth=1.5; ctx2.setLineDash([5,4]); ctx2.stroke();
      ctx2.setLineDash([]);
      ctx2.beginPath(); ctx2.arc(p2s.x,p2s.y,4,0,Math.PI*2);
      ctx2.fillStyle=COLORS[3]; ctx2.fill();
      // midpoint label position
      const mx=(p1s.x+p2s.x)/2,my=(p1s.y+p2s.y)/2;
      const ml=document.getElementById('measure-label');
      const dx=p2w.x-measurePt1.x,dy=p2w.y-measurePt1.y;
      const dist=Math.sqrt(dx*dx+dy*dy);
      ml.textContent='⟷ '+formatDistAuto(dist);
      ml.style.left=(mx+8)+'px'; ml.style.top=(my-16)+'px';
      ml.classList.add('visible');
      document.getElementById('stat-dist').textContent=formatDistAuto(dist);
    } else {
      document.getElementById('measure-label').classList.remove('visible');
    }
  } else {
    document.getElementById('measure-label').classList.remove('visible');
  }

  // Bodies
  bodies.forEach(b=>{
    const sp=worldToScreen(b.x,b.y);
    const sr=bodyScreenRadius(b);
    // Glow
    const grd=ctx2.createRadialGradient(sp.x,sp.y,0,sp.x,sp.y,sr*2.5);
    grd.addColorStop(0,b.color+'55'); grd.addColorStop(1,'transparent');
    ctx2.beginPath(); ctx2.arc(sp.x,sp.y,sr*2.5,0,Math.PI*2); ctx2.fillStyle=grd; ctx2.fill();
    // Disc
    const bg=ctx2.createRadialGradient(sp.x-sr*.25,sp.y-sr*.25,sr*.05,sp.x,sp.y,sr);
    bg.addColorStop(0,lighten(b.color,60)); bg.addColorStop(.5,b.color); bg.addColorStop(1,darken(b.color,40));
    ctx2.beginPath(); ctx2.arc(sp.x,sp.y,sr,0,Math.PI*2); ctx2.fillStyle=bg; ctx2.fill();
    // Hover ring
    if(hoveredBody===b.id){ctx2.beginPath();ctx2.arc(sp.x,sp.y,sr+3,0,Math.PI*2);ctx2.strokeStyle='#fff';ctx2.lineWidth=1.5;ctx2.stroke();}
    // Follow ring
    if(followBody===b.id){ctx2.beginPath();ctx2.arc(sp.x,sp.y,sr+5,0,Math.PI*2);ctx2.strokeStyle=b.color;ctx2.lineWidth=1;ctx2.setLineDash([3,3]);ctx2.stroke();ctx2.setLineDash([]);}
    // Label
    ctx2.fillStyle='rgba(200,216,238,.8)'; ctx2.font='10px monospace';
    ctx2.fillText(b.name,sp.x+sr+4,sp.y+3);
  });

  // E: Pending placement arrow on main canvas
  if(placePending){
    const sp=worldToScreen(placePending.x,placePending.y);
    ctx2.beginPath(); ctx2.arc(sp.x,sp.y,5,0,Math.PI*2);
    ctx2.strokeStyle='#fff'; ctx2.lineWidth=1.5; ctx2.setLineDash([2,2]); ctx2.stroke(); ctx2.setLineDash([]);
    if(velMag>0){
      // velAngle is in world frame: +x=right, +y=up
      // On screen: +x=right, +y=down — flip vy for screen
      const arrowLen=60;
      const ex=sp.x+Math.cos(velAngle)*arrowLen;
      const ey=sp.y-Math.sin(velAngle)*arrowLen;  // minus because screen y is flipped
      ctx2.beginPath(); ctx2.moveTo(sp.x,sp.y); ctx2.lineTo(ex,ey);
      ctx2.strokeStyle='rgba(255,200,80,.85)'; ctx2.lineWidth=2; ctx2.stroke();
      // Arrowhead
      const angle=Math.atan2(ey-sp.y,ex-sp.x);
      ctx2.beginPath();
      ctx2.moveTo(ex,ey);
      ctx2.lineTo(ex-10*Math.cos(angle-0.4),ey-10*Math.sin(angle-0.4));
      ctx2.lineTo(ex-10*Math.cos(angle+0.4),ey-10*Math.sin(angle+0.4));
      ctx2.closePath(); ctx2.fillStyle='rgba(255,200,80,.85)'; ctx2.fill();
    }
  }
}

// ── Simulation loop ────────────────────────────────────────────────────────
let lastTimestamp=null;
const BASE_DT=3600;

function simLoop(ts){
  if(isPlaying&&bodies.length>0){
    const wallDt=lastTimestamp?Math.min((ts-lastTimestamp)/1000,0.05):0.016;
    lastTimestamp=ts;
    const simDt=BASE_DT*timeWarp*(wallDt/0.016);
    const steps=Math.max(1,Math.min(8,Math.floor(Math.abs(timeWarp)/10)+1));
    const subDt=simDt/steps;
    for(let s=0;s<steps;s++){
      const adt=adaptiveStep(bodies,subDt);
      bodies=leapfrogStep(bodies,adt);
      bodies=checkCollisions(bodies);
    }
    simTime+=simDt; stepCount++;
    if(showTrails) bodies.forEach(b=>{
      let trail=trails.find(t=>t.id===b.id);
      if(!trail){trail={id:b.id,color:b.color,pts:[]};trails.push(trail);}
      if(stepCount%2===0){trail.pts.push({x:b.x,y:b.y});if(trail.pts.length>MAX_TRAIL)trail.pts.shift();}
    });
    trails=trails.filter(t=>bodies.find(b=>b.id===t.id));
    if(initialEnergy===null&&bodies.length>0) initialEnergy=totalEnergy(bodies);
    if(stepCount%10===0){
      document.getElementById('stat-time').textContent=formatTime(simTime);
      const E=totalEnergy(bodies);
      document.getElementById('stat-energy').textContent=formatSI(Math.abs(E))+'J';
      if(initialEnergy!==null&&Math.abs(initialEnergy)>0){
        const dE=Math.abs((E-initialEnergy)/initialEnergy)*100;
        const el=document.getElementById('stat-denergy');
        el.textContent=dE.toFixed(3)+'%';
        el.className='stat-val'+(dE<0.1?' ok':dE<1?' warn':'');
      }
      document.getElementById('stat-bodies').textContent=bodies.length;
      document.getElementById('stat-zoom').textContent=formatZoom(camZoom);
    }
    if(stepCount%120===0){detectResonances(bodies);updateResonanceUI();}
  } else {
    lastTimestamp=null;
    if(stepCount%5===0) document.getElementById('stat-zoom').textContent=formatZoom(camZoom);
  }
  drawFrame();
  requestAnimationFrame(simLoop);
}

function formatZoom(z){
  if(z>=0.01) return z.toFixed(3)+'×';
  return z.toExponential(2)+'×';
}
function updateResonanceUI(){
  const el=document.getElementById('res-entries');
  el.innerHTML=resonanceData.length?resonanceData.map(r=>`<div class="res-entry">${r}</div>`).join(''):'—';
}
function formatTime(s){
  if(s<3600) return s.toFixed(0)+'s';
  if(s<86400) return (s/3600).toFixed(1)+'hr';
  if(s<YEAR) return (s/86400).toFixed(1)+'d';
  return (s/YEAR).toFixed(2)+'yr';
}
function formatSI(v){
  if(v>=1e30) return (v/1e30).toFixed(2)+'×10³⁰ ';
  if(v>=1e27) return (v/1e27).toFixed(2)+'×10²⁷ ';
  if(v>=1e24) return (v/1e24).toFixed(2)+'×10²⁴ ';
  if(v>=1e21) return (v/1e21).toFixed(2)+'×10²¹ ';
  return v.toExponential(2)+' ';
}

// ── Body creation ──────────────────────────────────────────────────────────
const BODY_NAMES=['Alpha','Beta','Gamma','Delta','Epsilon','Zeta','Eta','Theta','Iota','Kappa'];

function addBody(x,y,mass,vx,vy,name,color){
  const b={
    id:++bodyCounter,
    name:name||(BODY_NAMES[bodies.length%BODY_NAMES.length]),
    mass,x,y,vx,vy,ax:0,ay:0,
    physRadius:physRadiusFromMass(mass),
    color:color||COLORS[colorIdx++%COLORS.length],
  };
  bodies.push(b);
  initialEnergy=null;
  return b;
}

// ── E: Velocity wheel ──────────────────────────────────────────────────────
const velCanvas=document.getElementById('vel-canvas');
const vctx=velCanvas.getContext('2d');

function drawVelWheel(){
  const W=80,cx=40,cy=40;
  vctx.clearRect(0,0,W,W);
  vctx.beginPath(); vctx.arc(cx,cy,36,0,Math.PI*2); vctx.fillStyle='#080b12'; vctx.fill();
  vctx.strokeStyle='#1f2d45'; vctx.lineWidth=1; vctx.stroke();
  // Cardinals
  vctx.strokeStyle='#2a3a55'; vctx.lineWidth=0.5;
  vctx.beginPath();vctx.moveTo(cx-36,cy);vctx.lineTo(cx+36,cy);vctx.stroke();
  vctx.beginPath();vctx.moveTo(cx,cy-36);vctx.lineTo(cx,cy+36);vctx.stroke();
  // N/E labels
  vctx.fillStyle='#3d5070'; vctx.font='7px monospace'; vctx.textAlign='center';
  vctx.fillText('+Y',cx,cy-28); vctx.fillText('+X',cx+28,cy+3);
  // Arrow
  if(velMag>0){
    const mag=Math.min(1,velMag/3e4)*30;
    // velAngle: 0=+x, π/2=+y (world frame)
    // In the wheel canvas: screen y is inverted, so draw with -sin
    const ex=cx+Math.cos(velAngle)*mag;
    const ey=cy-Math.sin(velAngle)*mag;
    ctx2; // not needed here
    vctx.beginPath();vctx.moveTo(cx,cy);vctx.lineTo(ex,ey);
    vctx.strokeStyle='#f0a050';vctx.lineWidth=2;vctx.stroke();
    vctx.beginPath();vctx.arc(ex,ey,3,0,Math.PI*2);
    vctx.fillStyle='#f0a050';vctx.fill();
  }
  vctx.beginPath();vctx.arc(cx,cy,3,0,Math.PI*2);vctx.fillStyle='#5a7399';vctx.fill();
}

velCanvas.addEventListener('mousedown',e=>{velDragging=true;updateVelFromWheel(e)});
document.addEventListener('mousemove',e=>{if(velDragging)updateVelFromWheel(e)});
document.addEventListener('mouseup',()=>{velDragging=false});

function updateVelFromWheel(e){
  const rect=velCanvas.getBoundingClientRect();
  const dx=e.clientX-rect.left-40, dy=e.clientY-rect.top-40;
  const dist=Math.sqrt(dx*dx+dy*dy);
  // velAngle in world frame: +x=right, +y=up → screen y is negated
  velAngle=Math.atan2(-dy,dx);
  velMag=(dist/30)*3e4;
  syncVelInputs();
  drawVelWheel();
}

function syncVelInputs(){
  document.getElementById('pop-speed').value=velMag.toFixed(0);
  // Convert radians to degrees: 0°=+X, 90°=+Y
  document.getElementById('pop-angle').value=(velAngle*180/Math.PI).toFixed(1);
}

document.getElementById('pop-speed').addEventListener('input',()=>{
  velMag=parseFloat(document.getElementById('pop-speed').value)||0;
  drawVelWheel();
});
document.getElementById('pop-angle').addEventListener('input',()=>{
  velAngle=parseFloat(document.getElementById('pop-angle').value)*Math.PI/180;
  drawVelWheel();
});

// ── B: Zoom anchored to mouse ──────────────────────────────────────────────
simCanvas.addEventListener('wheel',e=>{
  e.preventDefault();
  const rect=simCanvas.getBoundingClientRect();
  const sx=e.clientX-rect.left, sy=e.clientY-rect.top;
  const before=screenToWorld(sx,sy);
  const factor=e.deltaY>0?0.88:1.136;
  camZoom=Math.min(50,Math.max(1e-13,camZoom*factor));
  // Anchor zoom to mouse position
  const after=screenToWorld(sx,sy);
  camX+=before.x-after.x;
  camY+=before.y-after.y;
},{passive:false});

// B: + / - keyboard zoom
function zoomStep(factor){
  const cx=simCanvas.width/2, cy=simCanvas.height/2;
  const before=screenToWorld(cx,cy);
  camZoom=Math.min(50,Math.max(1e-13,camZoom*factor));
  const after=screenToWorld(cx,cy);
  camX+=before.x-after.x; camY+=before.y-after.y;
}

simCanvas.addEventListener('click',e=>{
  if(e.button!==0||panning) return;
  const rect=simCanvas.getBoundingClientRect();
  const sx=e.clientX-rect.left, sy=e.clientY-rect.top;
  const wp=screenToWorld(sx,sy);

  // A: Measure mode clicks
  if(mode==='measure'){
    if(!measurePt1){measurePt1=wp;}
    else{measurePt2=wp; measurePt1=null; measurePt2=null; measurePt1=wp; measurePt2=null;}
    // Toggle: first click sets pt1, second click locks pt2, third resets
    if(!measurePt2){ measurePt1=wp; }
    else { measurePt1=null; measurePt2=null; }
    return;
  }

  if(mode==='place'){
    // Check click on existing body → toggle follow
    for(const b of bodies){
      const sp=worldToScreen(b.x,b.y);
      const sr=bodyScreenRadius(b)+8;
      const dx=sx-sp.x,dy=sy-sp.y;
      if(dx*dx+dy*dy<sr*sr){
        followBody=followBody===b.id?null:b.id;
        if(followBody) toast(`Following ${b.name}`);
        return;
      }
    }
    // Open placement popover
    placePending=wp;
    const pop=document.getElementById('place-popover');
    pop.classList.add('visible');
    let px=sx+12, py=sy-12;
    if(px+240>simCanvas.width) px=sx-250;
    if(py+310>simCanvas.height) py=sy-320;
    pop.style.left=px+'px'; pop.style.top=py+'px';
    document.getElementById('pop-name').value=BODY_NAMES[bodies.length%BODY_NAMES.length];
    velAngle=Math.PI/2; velMag=0;
    syncVelInputs(); drawVelWheel();
  }
});

// A: Measure — track mouse for live second point
simCanvas.addEventListener('mousemove',e=>{
  if(panning){
    camX-=(e.clientX-panStartX)/camZoom;
    camY+=(e.clientY-panStartY)/camZoom;
    panStartX=e.clientX; panStartY=e.clientY;
    return;
  }
  const rect=simCanvas.getBoundingClientRect();
  const sx=e.clientX-rect.left, sy=e.clientY-rect.top;
  const wp=screenToWorld(sx,sy);

  if(mode==='measure') measureMouseWorld=wp;

  // Hover detection for tooltip
  hoveredBody=null;
  let found=false;
  for(const b of bodies){
    const sp=worldToScreen(b.x,b.y);
    const sr=bodyScreenRadius(b)+6;
    const dx=sx-sp.x,dy=sy-sp.y;
    if(dx*dx+dy*dy<sr*sr){
      hoveredBody=b.id;
      const tt=document.getElementById('body-tooltip');
      tt.classList.add('visible');
      tt.style.left=(sx+12)+'px'; tt.style.top=(sy-10)+'px';
      document.getElementById('tt-name').textContent=b.name;
      document.getElementById('tt-mass').textContent='m: '+formatSI(b.mass)+'kg';
      const spd=Math.sqrt(b.vx*b.vx+b.vy*b.vy);
      document.getElementById('tt-vel').textContent='|v|: '+formatSI(spd)+'m/s';
      const T=estimatePeriod(b,bodies);
      document.getElementById('tt-period').textContent=T?'T: '+formatTime(T):'';
      // Distance to heaviest
      if(bodies.length>1){
        const heavy=bodies.reduce((a,c)=>c.mass>a.mass?c:a,bodies[0]);
        if(b!==heavy){
          const ddx=b.x-heavy.x,ddy=b.y-heavy.y;
          const dd=Math.sqrt(ddx*ddx+ddy*ddy);
          document.getElementById('tt-dist').textContent='d('+heavy.name+'): '+formatDistAuto(dd);
        } else { document.getElementById('tt-dist').textContent=''; }
      }
      found=true; break;
    }
  }
  if(!found) document.getElementById('body-tooltip').classList.remove('visible');
});

simCanvas.addEventListener('mouseleave',()=>{
  document.getElementById('body-tooltip').classList.remove('visible');
  measureMouseWorld=null;
});

// ── A: Measure — click handling (proper toggle logic) ──────────────────────
// Override the click handler above with proper state machine
simCanvas.removeEventListener('click', simCanvas._clickHandler);
simCanvas._clickHandler = function(e){
  if(e.button!==0) return;
  const rect=simCanvas.getBoundingClientRect();
  const sx=e.clientX-rect.left, sy=e.clientY-rect.top;
  const wp=screenToWorld(sx,sy);

  if(mode==='measure'){
    if(!measurePt1){ measurePt1=wp; }
    else { measurePt1=wp; measurePt2=null; }
    return;
  }
  if(mode==='place'){
    for(const b of bodies){
      const sp=worldToScreen(b.x,b.y);
      const sr=bodyScreenRadius(b)+8;
      const dx=sx-sp.x,dy=sy-sp.y;
      if(dx*dx+dy*dy<sr*sr){
        followBody=followBody===b.id?null:b.id;
        if(followBody) toast(`Following ${b.name}`);
        return;
      }
    }
    placePending=wp;
    const pop=document.getElementById('place-popover');
    pop.classList.add('visible');
    let px=sx+12, py=sy-12;
    if(px+240>simCanvas.width) px=sx-250;
    if(py+310>simCanvas.height) py=sy-320;
    pop.style.left=px+'px'; pop.style.top=py+'px';
    document.getElementById('pop-name').value=BODY_NAMES[bodies.length%BODY_NAMES.length];
    velAngle=Math.PI/2; velMag=0;
    syncVelInputs(); drawVelWheel();
  }
};
simCanvas.addEventListener('click', simCanvas._clickHandler);

function fitAll(){
  if(!bodies.length){camX=0;camY=0;camZoom=1e-10;return;}
  followBody=null;
  let minX=Infinity,maxX=-Infinity,minY=Infinity,maxY=-Infinity;
  bodies.forEach(b=>{minX=Math.min(minX,b.x);maxX=Math.max(maxX,b.x);minY=Math.min(minY,b.y);maxY=Math.max(maxY,b.y);});
  camX=(minX+maxX)/2; camY=(minY+maxY)/2;
  const rX=(maxX-minX)||AU, rY=(maxY-minY)||AU;
  camZoom=Math.min(simCanvas.width/rX,simCanvas.height/rY)*0.4;
  camZoom=Math.min(50,Math.max(1e-13,camZoom));
}

// ── D: Corrected presets ───────────────────────────────────────────────────
const PRESETS={
  solar:()=>{
    resetSim();
    addBody(0,0,1.989e30,0,0,'Sun','#ffcc44');
    // Circular orbit: v = sqrt(G*M_sun/a), placed at (a,0), velocity is tangential = +y direction
    const planets=[
      ['Mercury',3.30e23,0.387*AU,47360,'#b0a090'],
      ['Venus',  4.87e24,0.723*AU,35020,'#e8d080'],
      ['Earth',  5.97e24,1.000*AU,29780,'#4488ff'],
      ['Mars',   6.42e23,1.524*AU,24130,'#cc5533'],
      ['Jupiter',1.90e27,5.203*AU,13070,'#c89060'],
      ['Saturn', 5.68e26,9.537*AU, 9690,'#d4b870'],
      ['Uranus', 8.68e25,19.19*AU, 6810,'#80d4e8'],
      ['Neptune',1.02e26,30.07*AU, 5430,'#4060e0'],
    ];
    // Body at (a, 0): tangential velocity is +y = (0, v_circ)
    planets.forEach(([n,m,a,v,c])=>addBody(a,0,m,0,v,n,c));
    fitAll(); toast('Solar System loaded');
  },

  earthmoon:()=>{
    resetSim();
    const MOON_A=3.844e8;
    // D: Earth at origin, velocity 0
    // Moon at (+MOON_A, 0), tangential velocity = +y = (0, +1022)
    // v_circ = sqrt(G*M_earth/MOON_A) = sqrt(6.674e-11 * 5.972e24 / 3.844e8) ≈ 1022 m/s
    addBody(0,0,5.972e24,0,0,'Earth','#4488ff');
    addBody(MOON_A,0,7.342e22,0,1022,'Moon','#aaaaaa');
    // Camera: show orbit comfortably
    camX=0; camY=0;
    camZoom=simCanvas.height/(MOON_A*3.2);
    toast('Earth–Moon loaded — Press Play');
  },

  binary:()=>{
    resetSim();
    const M=1.0e30, sep=1.5*AU;
    // Each star orbits CoM at sep/2
    // v_circ for each = sqrt(G*M/(2*sep)) — both orbit in opposite directions
    const v=Math.sqrt(G*M/(2*sep));
    // Star A at (-sep/2, 0), tangential = -y for CCW from A's perspective
    // Star B at (+sep/2, 0), tangential = +y
    addBody(-sep/2,0,M,0,-v,'Star A','#ffaa44');
    addBody( sep/2,0,M,0, v,'Star B','#44aaff');
    fitAll(); toast('Binary Stars loaded');
  },

  // D: Figure-8 — correct Chenciner-Montgomery solution
  figure8:()=>{
    resetSim();
    const m=1e30;
    // Position scale: 3e11 m
    const ps=3.0e11;
    // Velocity scale: sqrt(G*m/ps)
    const vs=Math.sqrt(G*m/ps);
    // Dimensionless positions (Chenciner & Montgomery 2000)
    const pos=[
      [-0.97000436, 0.24308753],
      [ 0.0,        0.0       ],
      [ 0.97000436,-0.24308753],
    ];
    // Dimensionless velocities (corrected — NOT divided by 2)
    const vel=[
      [ 0.46620368, 0.43236573],
      [-0.93240737,-0.86473146],
      [ 0.46620368, 0.43236573],
    ];
    const colors=['#ff6644','#44ff88','#4488ff'];
    const names=['Α','Β','Γ'];
    pos.forEach((p,i)=>{
      addBody(
        p[0]*ps, p[1]*ps,
        m,
        vel[i][0]*vs, vel[i][1]*vs,
        names[i], colors[i]
      );
    });
    fitAll();
    // Set a good timewarp for figure-8 period (~6.3 dimensionless ≈ large real time)
    const twEl=document.getElementById('timewarp-slider');
    twEl.value='2'; timeWarp=100;
    document.getElementById('timewarp-display').textContent='100×';
    toast('Figure-8 three-body loaded — Press Play');
  },

  blank:()=>{resetSim();toast('Canvas cleared');}
};

  inp.addEventListener('change',()=>{
    const f=inp.files[0]; if(!f) return;
    const r=new FileReader();
    r.onload=ev=>{
      try{
        const s=JSON.parse(ev.target.result);
        if(s.cells){cells=s.cells;cellCounter=Math.max(...cells.map(c=>c.id),0);renderNotebook();}
        if(s.bodies){bodies=s.bodies;bodyCounter=Math.max(...bodies.map(b=>b.id),0);}
        if(s.simTime) simTime=s.simTime;
        if(s.camX!==undefined){camX=s.camX;camY=s.camY;camZoom=s.camZoom;}
        initialEnergy=null; toast('Session imported');
      }catch{toast('Import failed: invalid file');}
    };
    r.readAsText(f);
  });
  inp.click();
});

// ── Toast ──────────────────────────────────────────────────────────────────
function toast(msg){
  const c=document.getElementById('toast-container');
  const t=document.createElement('div'); t.className='toast'; t.textContent=msg;
  c.appendChild(t); setTimeout(()=>t.remove(),2500);
}

// ── Init ───────────────────────────────────────────────────────────────────
window.addEventListener('resize',resizeCanvases);
resizeCanvases();
drawVelWheel();

cells.push(createCell('md',
`# Orbital Notebook

A physics simulator for **N-body gravitational dynamics**.

- **P** — place bodies · **V** — pan · **M** — measure distance
- **G** — grid · **T** — trails · **F** — fit all · **Space** — play/pause
- **+/−** — zoom · **Home** — reset camera
- Right-click drag always pans, regardless of mode
- Hover a body for mass, velocity, distance and orbital period
- Use the velocity wheel to set direction, or type degrees directly`
));
cells.push(createCell('text','Simulation notes:'));
renderNotebook();

PRESETS.solar();
fitAll();
requestAnimationFrame(simLoop);
</script>
